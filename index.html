<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VizShow ©</title>
  <link rel="icon" type="image/x-icon" href="./ViZShow.ico" />
  <style>
    :root {
      --bg: #08090d;
      --panel: #12141b;
      --panel-2: #1a1d27;
      --text: #f3f5f9;
      --muted: #a7afbf;
      --line: rgba(255,255,255,.09);
      --accent: #7aa2ff;
      --accent-2: #9f7aff;
      --danger: #ff7a7a;
      --radius: 18px;
      --shadow: 0 20px 60px rgba(0,0,0,.45);
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at top, #151926 0%, var(--bg) 48%, #05060a 100%);
      color: var(--text);
      font-family: Inter, Arial, Helvetica, sans-serif;
      overflow: hidden;
    }

    .app {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 18px;
      height: 100vh;
      padding: 18px;
    }

    .panel {
      background: linear-gradient(180deg, rgba(255,255,255,.035), rgba(255,255,255,.02));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .sidebar {
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      overflow: auto;
    }

    h1 {
      font-size: 1.35rem;
      margin: 0;
      letter-spacing: .02em;
    }

    .brand-title {
      display: block;
      width: min(100%, 320px);
      height: auto;
      margin: 0;
      filter: drop-shadow(0 10px 22px rgba(96, 59, 255, .25));
    }

    .sub {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: .94rem;
      line-height: 1.4;
    }

    .dropzone {
      border: 1.5px dashed rgba(122,162,255,.45);
      background: linear-gradient(180deg, rgba(122,162,255,.11), rgba(159,122,255,.08));
      border-radius: 16px;
      padding: 18px;
      text-align: center;
      transition: .18s ease;
      cursor: pointer;
    }

    .dropzone:hover, .dropzone.dragover {
      transform: translateY(-1px);
      border-color: rgba(159,122,255,.75);
      background: linear-gradient(180deg, rgba(122,162,255,.18), rgba(159,122,255,.15));
    }

    .dropzone strong {
      display: block;
      font-size: 1rem;
      margin-bottom: 6px;
    }

    .dropzone span {
      color: var(--muted);
      font-size: .92rem;
    }

    input[type="file"] { display: none; }

    .group {
      background: rgba(255,255,255,.025);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
    }

    .group h2 {
      margin: 0 0 12px;
      font-size: .95rem;
      color: #d9deea;
      letter-spacing: .02em;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .row:last-child { margin-bottom: 0; }

    .row label {
      color: var(--muted);
      font-size: .92rem;
      flex: 1;
    }

    .row output {
      min-width: 50px;
      text-align: right;
      color: #dfe6ff;
      font-size: .9rem;
    }

    select, button, input[type="range"], input[type="color"] {
      width: 100%;
    }

    select, button {
      appearance: none;
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 12px;
      padding: 10px 12px;
      font-size: .94rem;
    }

    button {
      cursor: pointer;
      transition: .15s ease;
    }

    button:hover { transform: translateY(-1px); }
    .primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border: none;
      color: white;
      font-weight: 700;
    }
    .danger {
      background: rgba(255,122,122,.12);
      border-color: rgba(255,122,122,.2);
      color: #ffd0d0;
    }

    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      width: auto;
      cursor: pointer;
      user-select: none;
      color: var(--muted);
      font-size: .92rem;
    }

    .toggle input {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
    }

    .stage {
      position: relative;
      overflow: hidden;
      display: grid;
      place-items: center;
      min-width: 0;
      background: #05060a;
    }

    .media-wrap {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .media-wrap img,
    .media-wrap video,
    .media-wrap canvas {
      max-width: none;
      max-height: none;
      transform-origin: center center;
      will-change: transform, filter;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
      box-shadow: 0 0 80px rgba(0,0,0,.35);
    }

    .placeholder {
      text-align: center;
      padding: 30px;
      color: var(--muted);
      z-index: 2;
    }

    .placeholder strong {
      display: block;
      color: var(--text);
      font-size: 1.2rem;
      margin-bottom: 8px;
    }

    .hud {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      z-index: 4;
      pointer-events: none;
    }

    .badge {
      pointer-events: auto;
      background: rgba(0,0,0,.45);
      border: 1px solid rgba(255,255,255,.08);
      color: #eef2fb;
      padding: 9px 12px;
      border-radius: 999px;
      font-size: .86rem;
      backdrop-filter: blur(8px);
      max-width: 60%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .mini-controls {
      pointer-events: auto;
      display: flex;
      gap: 8px;
    }

    .mini-controls button {
      width: auto;
      padding: 9px 12px;
      border-radius: 999px;
      background: rgba(0,0,0,.45);
    }

    .hidden { display: none !important; }

    @media (max-width: 980px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
        overflow: auto;
        height: auto;
        min-height: 100vh;
      }
      .stage {
        min-height: 58vh;
      }
    }
	/* Scrollbars themed to match VizShow */
* {
  scrollbar-width: thin;
  scrollbar-color: var(--accent) rgba(255,255,255,.06);
}

*::-webkit-scrollbar {
  width: 12px;
  height: 12px;
}

*::-webkit-scrollbar-track {
  background: rgba(255,255,255,.04);
  border-radius: 999px;
}

*::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, var(--accent), var(--accent-2));
  border-radius: 999px;
  border: 2px solid rgba(8,9,13,.9);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.08);
}

*::-webkit-scrollbar-thumb:hover {
  background: linear-gradient(180deg, var(--accent-2), var(--accent));
}

*::-webkit-scrollbar-corner {
  background: rgba(255,255,255,.04);
}
  </style>
</head>
<body>
  <div class="app">
    <aside class="panel sidebar">
      <div>
        <img class="brand-title" src="./ViZShowTitle.png" alt="VizShow ©" />
        <p class="sub">Load a GIF or video, loop it, scale it, and use it as a fullscreen visualizer.</p>
      </div>

      <div class="group">
        <h2>Source</h2>
        <div class="row">
          <label for="sourceMode">Visualizer source</label>
        </div>
        <select id="sourceMode">
          <option value="upload" selected>Uploaded GIF / Video</option>
          <option value="preset">Preset Visual</option>
        </select>

        <div id="uploadSourceUI">
          <label class="dropzone" id="dropzone" for="fileInput" style="margin-top:12px; display:block;">
            <strong>Drop GIF or video here</strong>
            <span>or click to browse • GIF, MP4, WEBM, OGG, MOV (browser support varies)</span>
          </label>
          <input id="fileInput" type="file" accept="image/gif,video/*" />
        </div>

        <div id="presetSourceUI" class="hidden" style="margin-top:12px;">
          <div class="row">
            <label for="presetSelect">Preset</label>
          </div>
          <select id="presetSelect">
            <option value="heartbeat" selected>Heartbeat Wave</option>
            <option value="oceanBreak">Ocean Break</option>
            <option value="intensiveFlame">Intensive Flame</option>
            <option value="fractalSink">Fractal Sink</option>
            <option value="hyperJumpSpaceship">Hyper Jump Spaceship</option>
            <option value="fractalCollapse">Fractal Collapse</option>
            <option value="signalBloom">Signal Bloom</option>
            <option value="bioPulse">Bio Pulse</option>
            <option value="quantumDrift">Quantum Drift</option>
            <option value="infiniteMirror">Infinite Mirror</option>
            <option value="fractalCollapseSpiral">Fractal Collapse Spiral</option>
            <option value="signalBloomOrbit">Signal Bloom Orbit</option>
            <option value="bioPulseCells">Bio Pulse Cells</option>
            <option value="quantumDriftRibbons">Quantum Drift Ribbons</option>
            <option value="infiniteMirrorTunnel">Infinite Mirror Tunnel</option>
            <option value="fractalPulse">Fractal Pulse</option>
            <option value="signalWeave">Signal Weave</option>
            <option value="bioLattice">Bio Lattice</option>
            <option value="quantumTunnel">Quantum Tunnel</option>
            <option value="mirrorShatter">Mirror Shatter</option>
          </select>
          <div class="row" style="margin-top:12px;">
            <label for="presetHueSpeedRange">Hue drift</label>
            <output id="presetHueSpeedOut">0.60x</output>
          </div>
          <input id="presetHueSpeedRange" type="range" min="0" max="3" step="0.05" value="0.6" />
          <div class="row" style="margin-top:12px;">
            <label for="presetAccentColor">Preset accent</label>
          </div>
          <input id="presetAccentColor" type="color" value="#ff4d6d" />
        </div>
      </div>

      <div class="group">
        <h2>Playback</h2>
        <div class="row">
          <label class="toggle"><input id="loopToggle" type="checkbox" checked /> Loop media</label>
        </div>
        <div class="row">
          <label class="toggle"><input id="autoplayToggle" type="checkbox" checked /> Autoplay on load</label>
        </div>
        <div class="row">
          <label class="toggle"><input id="muteToggle" type="checkbox" checked /> Mute video audio</label>
        </div>
        <div class="row">
          <label for="speedRange">Playback speed</label>
          <output id="speedOut">1.00x</output>
        </div>
        <input id="speedRange" type="range" min="0.25" max="3" step="0.05" value="1" />
      </div>

      <div class="group">
        <h2>Visual</h2>
        <div class="row">
          <label for="fitMode">Fit mode</label>
        </div>
        <select id="fitMode">
          <option value="contain">Contain</option>
          <option value="cover" selected>Cover</option>
          <option value="stretch">Stretch</option>
        </select>

        <div class="row" style="margin-top:12px;">
          <label for="zoomRange">Zoom</label>
          <output id="zoomOut">1.00x</output>
        </div>
        <input id="zoomRange" type="range" min="0.25" max="4" step="0.01" value="1" />

        <div class="row" style="margin-top:12px;">
          <label for="brightnessRange">Brightness</label>
          <output id="brightnessOut">100%</output>
        </div>
        <input id="brightnessRange" type="range" min="20" max="200" step="1" value="100" />

        <div class="row" style="margin-top:12px;">
          <label for="bgColor">Background</label>
        </div>
        <input id="bgColor" type="color" value="#05060a" />
      </div>

      <div class="group">
        <h2>Actions</h2>
        <div class="row"><button class="primary" id="fullscreenBtn">Toggle fullscreen</button></div>
        <div class="row"><button id="playPauseBtn">Play / Pause</button></div>
        <div class="row"><button id="restartBtn">Restart</button></div>
        <div class="row"><button class="danger" id="clearBtn">Clear media</button></div>
      </div>
    </aside>

    <main class="panel stage" id="stage">
      <div class="media-wrap" id="mediaWrap"></div>
      <div class="placeholder" id="placeholder">
        <strong>No visual source loaded</strong>
        Load a GIF or video, or switch to a preset visualizer source.
      </div>
      <div class="hud">
        <div class="badge" id="fileBadge">Ready</div>
        <div class="mini-controls">
          <button id="miniPlayPause">Play / Pause</button>
          <button id="miniFullscreen">Fullscreen</button>
        </div>
      </div>
    </main>
  </div>

  <script>
const fileInput = document.getElementById('fileInput');
    const dropzone = document.getElementById('dropzone');
    const sourceMode = document.getElementById('sourceMode');
    const uploadSourceUI = document.getElementById('uploadSourceUI');
    const presetSourceUI = document.getElementById('presetSourceUI');
    const presetSelect = document.getElementById('presetSelect');
    const presetHueSpeedRange = document.getElementById('presetHueSpeedRange');
    const presetHueSpeedOut = document.getElementById('presetHueSpeedOut');
    const presetAccentColor = document.getElementById('presetAccentColor');
    const mediaWrap = document.getElementById('mediaWrap');
    const placeholder = document.getElementById('placeholder');
    const stage = document.getElementById('stage');
    const fileBadge = document.getElementById('fileBadge');

    const loopToggle = document.getElementById('loopToggle');
    const autoplayToggle = document.getElementById('autoplayToggle');
    const muteToggle = document.getElementById('muteToggle');
    const speedRange = document.getElementById('speedRange');
    const speedOut = document.getElementById('speedOut');
    const fitMode = document.getElementById('fitMode');
    const zoomRange = document.getElementById('zoomRange');
    const zoomOut = document.getElementById('zoomOut');
    const brightnessRange = document.getElementById('brightnessRange');
    const brightnessOut = document.getElementById('brightnessOut');
    const bgColor = document.getElementById('bgColor');

    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const restartBtn = document.getElementById('restartBtn');
    const clearBtn = document.getElementById('clearBtn');
    const miniPlayPause = document.getElementById('miniPlayPause');
    const miniFullscreen = document.getElementById('miniFullscreen');

    let currentElement = null;
    let currentUrl = null;
    let currentType = null;
    let presetAnimationFrame = null;
    let presetStartTime = 0;

    let signalBloomTrail = [];
    let quantumDriftParticles = [];
    let signalBloomOrbitSeeds = [];
    let bioPulseCells = [];
    let quantumRibbonParticles = [];
    let mirrorTunnelStars = [];


    function revokeCurrentUrl() {
      if (currentUrl) {
        URL.revokeObjectURL(currentUrl);
        currentUrl = null;
      }
    }

    function isGif(file) {
      return file.type === 'image/gif' || file.name.toLowerCase().endsWith('.gif');
    }

    function isVideo(file) {
      return file.type.startsWith('video/');
    }

    function stopPresetAnimation() {
      if (presetAnimationFrame) {
        cancelAnimationFrame(presetAnimationFrame);
        presetAnimationFrame = null;
      }
    }

    function clearMedia() {
      stopPresetAnimation();
      if (currentElement && currentElement.tagName === 'VIDEO') {
        currentElement.pause();
      }
      mediaWrap.innerHTML = '';
      currentElement = null;
      currentType = null;
      revokeCurrentUrl();
      placeholder.classList.remove('hidden');
      fileBadge.textContent = 'Ready';
    }

    function applyVisualState() {
      if (!currentElement) return;

      const zoom = Number(zoomRange.value);
      const brightness = Number(brightnessRange.value);
      currentElement.style.transform = `scale(${zoom})`;
      currentElement.style.filter = `brightness(${brightness}%)`;
      currentElement.style.minWidth = '';
      currentElement.style.minHeight = '';
      currentElement.style.maxWidth = '';
      currentElement.style.maxHeight = '';

      const fit = fitMode.value;
      currentElement.style.width = '';
      currentElement.style.height = '';
      currentElement.style.objectFit = '';

      if (currentElement.tagName === 'CANVAS') {
        currentElement.style.width = '100%';
        currentElement.style.height = '100%';
      } else if (fit === 'stretch') {
        currentElement.style.width = '100%';
        currentElement.style.height = '100%';
        if (currentElement.tagName === 'VIDEO') currentElement.style.objectFit = 'fill';
      } else if (fit === 'cover') {
        currentElement.style.width = '100%';
        currentElement.style.height = '100%';
        if (currentElement.tagName === 'VIDEO') {
          currentElement.style.objectFit = 'cover';
        } else {
          currentElement.style.minWidth = '100%';
          currentElement.style.minHeight = '100%';
          currentElement.style.width = 'auto';
          currentElement.style.height = 'auto';
        }
      } else {
        currentElement.style.maxWidth = '100%';
        currentElement.style.maxHeight = '100%';
        if (currentElement.tagName === 'VIDEO') currentElement.style.objectFit = 'contain';
      }

      stage.style.background = bgColor.value;
    }

    function applyPlaybackState() {
      if (!currentElement) return;
      if (currentElement.tagName === 'VIDEO') {
        currentElement.loop = loopToggle.checked;
        currentElement.muted = muteToggle.checked;
        currentElement.playbackRate = Number(speedRange.value);
      }
    }

    async function safePlay() {
      if (!currentElement || currentElement.tagName !== 'VIDEO') return;
      try {
        await currentElement.play();
      } catch (err) {
        console.warn('Autoplay was blocked by the browser until user interaction.', err);
      }
    }


    function resizePresetCanvas(canvas) {
      const rect = mediaWrap.getBoundingClientRect();
      canvas.width = Math.max(1, Math.floor(rect.width * window.devicePixelRatio));
      canvas.height = Math.max(1, Math.floor(rect.height * window.devicePixelRatio));
    }

    function createHeartbeatPreset() {
      clearMedia();

      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      currentElement = canvas;
      currentType = 'preset';
      mediaWrap.appendChild(canvas);
      placeholder.classList.add('hidden');
      fileBadge.textContent = 'Preset: Heartbeat Wave';
      resizePresetCanvas(canvas);
      applyVisualState();

      presetStartTime = performance.now();

      function draw(now) {
        if (currentElement !== canvas || currentType !== 'preset') return;

        const elapsed = (now - presetStartTime) / 1000;
        const w = canvas.width;
        const h = canvas.height;
        const hueDrift = Number(presetHueSpeedRange.value);
        const brightness = Number(brightnessRange.value) / 100;
        const zoom = Number(zoomRange.value);
        const accentHue = Number(hexToHsl(presetAccentColor.value).h);
        const hue = (accentHue + elapsed * 75 * hueDrift) % 360;
        const pulse = heartbeatPulse(elapsed * Math.max(0.35, Number(speedRange.value)));
        const centerY = h * 0.5;
        const baseline = h * 0.06 * zoom;
        const waveAmp = h * (0.055 + pulse * 0.07) * zoom;

        ctx.clearRect(0, 0, w, h);

        const bgGrad = ctx.createRadialGradient(w * 0.5, h * 0.5, h * 0.06, w * 0.5, h * 0.5, Math.max(w, h) * 0.7);
        bgGrad.addColorStop(0, `hsla(${hue}, 85%, ${Math.min(20 + pulse * 15, 36)}%, 0.55)`);
        bgGrad.addColorStop(0.45, `hsla(${(hue + 30) % 360}, 78%, 10%, 0.28)`);
        bgGrad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = bgGrad;
        ctx.fillRect(0, 0, w, h);

        ctx.save();
        ctx.shadowBlur = 24 + pulse * 34;
        ctx.shadowColor = `hsla(${hue}, 100%, 70%, 0.95)`;
        ctx.lineWidth = Math.max(3, h * 0.008 * zoom);
        ctx.strokeStyle = `hsla(${hue}, 100%, ${Math.min(60 + pulse * 12, 82)}%, ${Math.min(0.58 + pulse * 0.28, 0.95)})`;
        ctx.beginPath();
        for (let x = 0; x <= w; x += 4) {
          const t = x / w;
          const beatShape = heartbeatShape((elapsed * 1.35 + t * 1.08) % 1);
          const gentle = Math.sin((t * Math.PI * 8) + elapsed * 4.4) * baseline * 0.18;
          const y = centerY + gentle - (beatShape * waveAmp);
          if (x === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.stroke();
        ctx.restore();

        ctx.save();
        ctx.globalAlpha = 0.18 + pulse * 0.16;
        ctx.fillStyle = `hsla(${(hue + 8) % 360}, 100%, 70%, 0.75)`;
        const heartX = w * (0.16 + ((elapsed * 0.12) % 0.68));
        const heartY = centerY - h * 0.11 - pulse * h * 0.035;
        drawHeart(ctx, heartX, heartY, Math.max(16, h * 0.028 * (1 + pulse * 0.3)));
        ctx.restore();

        presetAnimationFrame = requestAnimationFrame(draw);
      }

      presetAnimationFrame = requestAnimationFrame(draw);
    }

    
    function createOceanBreakPreset() {
      clearMedia();

      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      currentElement = canvas;
      currentType = 'preset';
      mediaWrap.appendChild(canvas);
      placeholder.classList.add('hidden');
      fileBadge.textContent = 'Preset: Ocean Break';
      resizePresetCanvas(canvas);
      applyVisualState();

      presetStartTime = performance.now();

      function draw(now) {
        if (currentElement !== canvas || currentType !== 'preset') return;

        const elapsed = (now - presetStartTime) / 1000;
        const w = canvas.width;
        const h = canvas.height;
        const brightness = Number(brightnessRange.value) / 100;
        const zoom = Number(zoomRange.value);
        const speed = Math.max(0.2, Number(speedRange.value));
        const hueDrift = Number(presetHueSpeedRange.value);
        const accentHue = Number(hexToHsl(presetAccentColor.value).h);
        const hueBase = (accentHue + elapsed * 24 * hueDrift) % 360;
        const surf = oceanSwell(elapsed * speed);
        const foamGlow = 0.35 + surf * 0.65;

        ctx.clearRect(0, 0, w, h);

        const skyGrad = ctx.createLinearGradient(0, 0, 0, h);
        skyGrad.addColorStop(0, `hsl(${(hueBase + 28) % 360}, 70%, ${Math.min(18 + brightness * 10, 34)}%)`);
        skyGrad.addColorStop(0.38, `hsl(${(hueBase + 10) % 360}, 82%, ${Math.min(13 + brightness * 7, 24)}%)`);
        skyGrad.addColorStop(1, `hsl(${(hueBase - 18 + 360) % 360}, 85%, 6%)`);
        ctx.fillStyle = skyGrad;
        ctx.fillRect(0, 0, w, h);

        const moonGlow = ctx.createRadialGradient(w * 0.72, h * 0.22, h * 0.01, w * 0.72, h * 0.22, h * 0.22);
        moonGlow.addColorStop(0, `hsla(${(hueBase + 38) % 360}, 95%, 82%, ${0.32 + foamGlow * 0.12})`);
        moonGlow.addColorStop(0.35, `hsla(${(hueBase + 24) % 360}, 95%, 62%, 0.14)`);
        moonGlow.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = moonGlow;
        ctx.fillRect(0, 0, w, h);

        const horizonY = h * 0.42;
        const layers = [
          { amp: h * 0.016 * zoom, freq: 1.4, speed: 0.55, alpha: 0.22, light: 48, sat: 82, offset: 0.0, rise: 0.02 },
          { amp: h * 0.03 * zoom,  freq: 2.1, speed: 0.8,  alpha: 0.34, light: 40, sat: 86, offset: 1.7, rise: 0.11 },

        }

        for (let ring = 0; ring < 12; ring++) {
          const n = ring / 12;
          const r = minDim * (0.06 + n * 0.34) * zoom * (1 + Math.sin(elapsed * speed * 2.3 - n * 10) * 0.04);
          ctx.strokeStyle = `hsla(${(hue + 220 + ring * 10) % 360}, 100%, 70%, ${0.03 + (1 - n) * 0.06})`;
          ctx.lineWidth = Math.max(1, minDim * 0.0016);
          ctx.beginPath();
          ctx.arc(0, 0, r, 0, Math.PI * 2);
          ctx.stroke();
        }
        ctx.restore();

        presetAnimationFrame = requestAnimationFrame(draw);
      }

      presetAnimationFrame = requestAnimationFrame(draw);
    }

    function createMirrorShatterPreset() {
      clearMedia();

      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      currentElement = canvas;
      currentType = 'preset';
      mediaWrap.appendChild(canvas);
      placeholder.classList.add('hidden');
      fileBadge.textContent = 'Preset: Mirror Shatter';
      resizePresetCanvas(canvas);
      applyVisualState();

      presetStartTime = performance.now();

      function draw(now) {
        if (currentElement !== canvas || currentType !== 'preset') return;

        const elapsed = (now - presetStartTime) / 1000;
        const w = canvas.width;
        const h = canvas.height;
        const minDim = Math.min(w, h);
        const brightness = Number(brightnessRange.value) / 100;
        const zoom = Math.max(0.25, Number(zoomRange.value));
        const speed = Math.max(0.2, Number(speedRange.value));
        const hueDrift = Number(presetHueSpeedRange.value);
        const accentHue = Number(hexToHsl(presetAccentColor.value).h);
        const hue = (accentHue + elapsed * 46 * hueDrift) % 360;

        const off = document.createElement('canvas');
        off.width = w;
        off.height = h;
        const octx = off.getContext('2d');
        octx.drawImage(canvas, 0, 0);

        const bg = ctx.createRadialGradient(w * 0.5, h * 0.5, 0, w * 0.5, h * 0.5, minDim * 0.75);
        bg.addColorStop(0, `hsla(${(hue + 12) % 360}, 90%, ${Math.min(11 + brightness * 0.08, 18)}%, 0.28)`);
        bg.addColorStop(1, 'rgba(0,0,0,0.28)');
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, w, h);

        ctx.save();
        ctx.translate(w * 0.5, h * 0.5);
        ctx.globalCompositeOperation = 'screen';
        const shards = 7;
        for (let i = 0; i < shards; i++) {
          const start = (Math.PI * 2 * i) / shards + elapsed * speed * 0.08;
          const end = start + Math.PI * (0.26 + 0.02 * Math.sin(elapsed * speed + i));
          const scale = 0.86 - i * 0.06 + Math.sin(elapsed * speed * 1.5 + i * 0.8) * 0.02;
          ctx.save();
          ctx.rotate(Math.sin(elapsed * speed * 0.55 + i) * 0.2 + i * 0.05);
          ctx.scale(scale * zoom, scale * zoom);
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.arc(0, 0, minDim * 0.72, start, end);
          ctx.closePath();
          ctx.clip();
          ctx.drawImage(off, -w * 0.5, -h * 0.5, w, h);
          ctx.restore();

          ctx.save();
          ctx.rotate(i * 0.18 - elapsed * speed * 0.06);
          ctx.strokeStyle = `hsla(${(hue + i * 26) % 360}, 100%, 72%, 0.14)`;
          ctx.lineWidth = Math.max(1, minDim * 0.0022);
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.lineTo(Math.cos((start + end) * 0.5) * minDim * 0.68, Math.sin((start + end) * 0.5) * minDim * 0.68);
          ctx.stroke();
          ctx.restore();
        }
        ctx.restore();

        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        for (let ring = 0; ring < 4; ring++) {
          const r = minDim * (0.08 + ring * 0.08) * zoom;
          ctx.strokeStyle = `hsla(${(hue + 40 + ring * 20) % 360}, 100%, 70%, ${0.06 + ring * 0.03})`;
          ctx.lineWidth = Math.max(1, minDim * 0.0016);
          ctx.beginPath();
          ctx.arc(w * 0.5, h * 0.5, r, 0, Math.PI * 2);
          ctx.stroke();
        }
        ctx.restore();

        presetAnimationFrame = requestAnimationFrame(draw);
      }

      presetAnimationFrame = requestAnimationFrame(draw);
    }


    function hexToHsl(hex) {
      let r = 0, g = 0, b = 0;
      const normalized = hex.replace('#', '');
      if (normalized.length === 3) {
        r = parseInt(normalized[0] + normalized[0], 16) / 255;
        g = parseInt(normalized[1] + normalized[1], 16) / 255;
        b = parseInt(normalized[2] + normalized[2], 16) / 255;
      } else {
        r = parseInt(normalized.slice(0, 2), 16) / 255;
        g = parseInt(normalized.slice(2, 4), 16) / 255;
        b = parseInt(normalized.slice(4, 6), 16) / 255;
      }
      const max = Math.max(r, g, b), min = Math.min(r, g, b);
      let h, s;
      const l = (max + min) / 2;
      if (max === min) {
        h = s = 0;
      } else {
        const d = max - min;
        s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
        switch (max) {
          case r: h = (g - b) / d + (g < b ? 6 : 0); break;
          case g: h = (b - r) / d + 2; break;
          default: h = (r - g) / d + 4; break;
        }
        h /= 6;
      }
      return { h: h * 360, s, l };
    }

    function loadSelectedPreset() {
      if (presetSelect.value === 'heartbeat') {
        createHeartbeatPreset();
      } else if (presetSelect.value === 'oceanBreak') {
        createOceanBreakPreset();
      } else if (presetSelect.value === 'intensiveFlame') {
        createIntensiveFlamePreset();
      } else if (presetSelect.value === 'fractalSink') {
        createFractalSinkPreset();
      } else if (presetSelect.value === 'hyperJumpSpaceship') {
        createHyperJumpSpaceshipPreset();
      } else if (presetSelect.value === 'fractalCollapse') {
        createFractalCollapsePreset();
      } else if (presetSelect.value === 'signalBloom') {
        createSignalBloomPreset();
      } else if (presetSelect.value === 'bioPulse') {
        createBioPulsePreset();
      } else if (presetSelect.value === 'quantumDrift') {
        createQuantumDriftPreset();
      } else if (presetSelect.value === 'infiniteMirror') {
        createInfiniteMirrorPreset();
      } else if (presetSelect.value === 'fractalCollapseSpiral') {
        createFractalCollapseSpiralPreset();
      } else if (presetSelect.value === 'signalBloomOrbit') {
        createSignalBloomOrbitPreset();
      } else if (presetSelect.value === 'bioPulseCells') {
        createBioPulseCellsPreset();
      } else if (presetSelect.value === 'quantumDriftRibbons') {
        createQuantumDriftRibbonsPreset();
      } else if (presetSelect.value === 'infiniteMirrorTunnel') {
        createInfiniteMirrorTunnelPreset();
      } else if (presetSelect.value === 'fractalPulse') {
        createFractalPulsePreset();
      } else if (presetSelect.value === 'signalWeave') {
        createSignalWeavePreset();
      } else if (presetSelect.value === 'bioLattice') {
        createBioLatticePreset();
      } else if (presetSelect.value === 'quantumTunnel') {
        createQuantumTunnelPreset();
      } else if (presetSelect.value === 'mirrorShatter') {
        createMirrorShatterPreset();
      }
    }

    function syncSourceModeUI() {
      const presetMode = sourceMode.value === 'preset';
      uploadSourceUI.classList.toggle('hidden', presetMode);
      presetSourceUI.classList.toggle('hidden', !presetMode);

      if (presetMode) {
        loadSelectedPreset();
      } else if (currentType === 'preset') {
        clearMedia();
      }
    }

    function loadFile(file) {
      if (!file) return;
      sourceMode.value = 'upload';
      uploadSourceUI.classList.remove('hidden');
      presetSourceUI.classList.add('hidden');
      const gif = isGif(file);
      const video = isVideo(file);

      if (!gif && !video) {
        alert('Please load a GIF or a video file.');
        return;
      }

      clearMedia();
      currentUrl = URL.createObjectURL(file);
      currentType = gif ? 'gif' : 'video';

      if (gif) {
        const img = document.createElement('img');
        img.src = currentUrl;
        img.alt = file.name;
        currentElement = img;
      } else {
        const vid = document.createElement('video');
        vid.src = currentUrl;
        vid.playsInline = true;
        vid.preload = 'auto';
        currentElement = vid;
      }

      mediaWrap.appendChild(currentElement);
      placeholder.classList.add('hidden');
      fileBadge.textContent = file.name;

      applyVisualState();
      applyPlaybackState();

      if (currentType === 'video' && autoplayToggle.checked) {
        safePlay();
      }
    }

    function togglePlayPause() {
      if (!currentElement) return;
      if (currentElement.tagName === 'VIDEO') {
        if (currentElement.paused) currentElement.play();
        else currentElement.pause();
      } else if (currentType === 'preset') {
        if (presetAnimationFrame) {
          stopPresetAnimation();
        } else {
          presetStartTime = performance.now();
          loadSelectedPreset();
        }
      }
    }

    function restartMedia() {
      if (!currentElement) return;
      if (currentElement.tagName === 'VIDEO') {
        currentElement.currentTime = 0;
        if (autoplayToggle.checked || !currentElement.paused) currentElement.play();
      } else if (currentType === 'gif') {
        const src = currentElement.src;
        currentElement.src = '';
        requestAnimationFrame(() => {
          currentElement.src = src;
        });
      } else if (currentType === 'preset') {
        loadSelectedPreset();
      }
    }

    async function toggleFullscreen() {
      if (!document.fullscreenElement) {
        try {
          await stage.requestFullscreen();
        } catch (err) {
          console.warn('Fullscreen failed.', err);
        }
      } else {
        await document.exitFullscreen();
      }
    }

    fileInput.addEventListener('change', e => loadFile(e.target.files[0]));
    sourceMode.addEventListener('change', syncSourceModeUI);
    presetSelect.addEventListener('change', loadSelectedPreset);

    ['dragenter', 'dragover'].forEach(evt => {
      dropzone.addEventListener(evt, e => {
        e.preventDefault();
        dropzone.classList.add('dragover');
      });
    });

    ['dragleave', 'drop'].forEach(evt => {
      dropzone.addEventListener(evt, e => {
        e.preventDefault();
        dropzone.classList.remove('dragover');
      });
    });

    dropzone.addEventListener('drop', e => {
      const file = e.dataTransfer.files?.[0];
      loadFile(file);
    });

    loopToggle.addEventListener('change', applyPlaybackState);
    muteToggle.addEventListener('change', applyPlaybackState);
    speedRange.addEventListener('input', () => {
      speedOut.textContent = `${Number(speedRange.value).toFixed(2)}x`;
      applyPlaybackState();
    });

    fitMode.addEventListener('change', applyVisualState);
    zoomRange.addEventListener('input', () => {
      zoomOut.textContent = `${Number(zoomRange.value).toFixed(2)}x`;
      applyVisualState();
    });
    brightnessRange.addEventListener('input', () => {
      brightnessOut.textContent = `${brightnessRange.value}%`;
      applyVisualState();
    });
    bgColor.addEventListener('input', applyVisualState);
    presetHueSpeedRange.addEventListener('input', () => {
      presetHueSpeedOut.textContent = `${Number(presetHueSpeedRange.value).toFixed(2)}x`;
    });
    presetAccentColor.addEventListener('input', () => {
      if (currentType === 'preset') loadSelectedPreset();
    });

    fullscreenBtn.addEventListener('click', toggleFullscreen);
    miniFullscreen.addEventListener('click', toggleFullscreen);
    playPauseBtn.addEventListener('click', togglePlayPause);
    miniPlayPause.addEventListener('click', togglePlayPause);
    restartBtn.addEventListener('click', restartMedia);
    clearBtn.addEventListener('click', () => {
      clearMedia();
      fileInput.value = '';
    });

    window.addEventListener('beforeunload', revokeCurrentUrl);
    window.addEventListener('resize', () => {
      if (currentType === 'preset' && currentElement?.tagName === 'CANVAS') {
        resizePresetCanvas(currentElement);
      }
    });
    speedOut.textContent = `${Number(speedRange.value).toFixed(2)}x`;
    zoomOut.textContent = `${Number(zoomRange.value).toFixed(2)}x`;
    brightnessOut.textContent = `${brightnessRange.value}%`;
    presetHueSpeedOut.textContent = `${Number(presetHueSpeedRange.value).toFixed(2)}x`;
    stage.style.background = bgColor.value;
    syncSourceModeUI();

  </script>
</body>
